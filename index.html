<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UMT Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>

/* VARIABLES */
:root{
    --primary:#177e9b;
    --primary-dark:#126a82;
    --border:#cfcfcf;
    --light:#e9e9e9;
    --bg:#eef5f9;
}

/* BASE */
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:var(--bg);
}

/* PAGE CONTAINER */
.container{
    background:url('https://sktlms.umt.edu.pk/moodle/pluginfile.php/1/theme_moove/loginbgimg/1765947176/SKT-LMS%20LoginPage%204.jpg') no-repeat center;
    background-size:cover;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* LOGO */
.logo img{
    width:170px;
    margin-bottom:15px;
}

/* LOGIN CARD */
.login-card{
    background:#f3f3f3;
    width:380px;
    padding:22px;
    border-radius:6px;
}

/* TITLE */
.login-card h2{
    margin:0 0 15px;
    font-size:22px;
    font-weight:400;
    color:#2d2d2d;
}

/* INPUT GROUP */
.input-group{
    display:flex;
    border:1px solid var(--border);
}

.input-group:not(:first-child){
    border-top:none;
}

/* ICON */
.input-icon{
    width:50px;
    background:var(--light);
    display:flex;
    align-items:center;
    justify-content:center;
    border-right:1px solid var(--border);
    font-size:16px;
}

/* INPUT */
.input-group input{
    border:none;
    outline:none;
    padding:12px;
    font-size:16px;
    width:100%;
    font-family:'Poppins', sans-serif;
}

/* PASSWORD STYLE */
.password input{
    background:#e8edf6;
}

/* REMEMBER */
.remember{
    margin:14px 0;
    font-size:14px;
}

.remember input{
    accent-color:var(--primary);
}

/* BUTTON */
button{
    width:100%;
    background:var(--primary);
    border:none;
    color:white;
    font-size:18px;
    padding:12px;
    cursor:pointer;
    margin-bottom:15px;
    transition:0.3s;
}

button:hover{
    background:var(--primary-dark);
}

/* LINK */
.forgot{
    color:var(--primary);
    font-size:15px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="https://sktlms.umt.edu.pk/moodle/pluginfile.php/1/core_admin/logo/0x200/1765947176/umt%20logo%202020.png" alt="UMT Logo">
    </div>

    <!-- LOGIN CARD -->
    <div class="login-card">

        <h2>Already have an account?</h2>

        <div class="input-group">
            <div class="input-icon">👤</div>
            <input type="text" placeholder="Username">
        </div>

        <div class="input-group password">
            <div class="input-icon">🔒</div>
            <input type="password" placeholder="Password">
        </div>

        <div class="remember">
            <input type="checkbox" checked> Remember username
        </div>

        <button>Log in</button>

        <a class="forgot" href="#">Forgotten your username or password?</a>

    </div>

</div>

</body>
</html>
