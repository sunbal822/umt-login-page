<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:url('https://sktlms.umt.edu.pk/moodle/pluginfile.php/1/theme_moove/loginbgimg/1765947176/SKT-LMS%20LoginPage%204.jpg');
    background-size:cover;
}

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.logo img{
    width:160px;
    margin-bottom:10px;
}

.box{
    background:#f4f4f4;
    padding:20px;
    width:360px;
    border-radius:5px;
}

.box h2{
    font-size:20px;
    font-weight:400;
    margin-bottom:15px;
}

.field{
    display:flex;
    border:1px solid #ccc;
    margin-bottom:5px;
}

.icon{
    background:#e5e5e5;
    padding:10px;
    width:40px;
    text-align:center;
}

.field input{
    border:none;
    padding:10px;
    width:100%;
}

/* checkbox */
.rem{
    font-size:13px;
    margin:10px 0;
}

.btn{
    width:100%;
    padding:10px;
    background:#177e9b;
    color:white;
    border:none;
    cursor:pointer;
}

.btn:hover{
    background:#126a82;
}

/* link */
.link{
    font-size:13px;
    color:#177e9b;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="main">

    <div>

        <div class="logo">
            <img src="https://sktlms.umt.edu.pk/moodle/pluginfile.php/1/core_admin/logo/0x200/1765947176/umt%20logo%202020.png">
        </div>

        <div class="box">

            <h2>Already have an account?</h2>

            <div class="field">
                <div class="icon">👤</div>
                <input type="text" placeholder="Username">
            </div>

            <div class="field">
                <div class="icon">🔒</div>
                <input type="password" placeholder="Password">
            </div>

            <div class="rem">
                <input type="checkbox"> Remember me
            </div>

            <button class="btn">Log in</button>

            <a href="#" class="link">Forgot password?</a>

        </div>

    </div>

</div>

</body>
</html>
